site_name: CSIS Documentation Portal
site_url: https://lesotho-meteorological-services.github.io/csis-docs/
site_description: User Guide and System Administration documentation for the Climate Services Information System
site_author: CSIS Team

theme:
  name: material
  language: en
  logo: assets/images/lms-logo.svg
  favicon: assets/images/lms-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - def_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md

  - User Guide:
      - Overview: user-guide/index.md
      - Getting Started: user-guide/getting-started.md
      - Operational Workflows:
          - Forecast Workflow: operations/forecast-workflow.md
          - Warning Workflow: operations/warning-workflow.md

  - System Administration:
      - Overview: admin-guide/index.md
      - Installation: admin-guide/installation.md
      - Operations: admin-guide/operations.md

extra:
  version:
    provider: mike
