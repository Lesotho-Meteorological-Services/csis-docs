<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Lesotho Meteorological Services logo</title>
  <desc id="desc">A circular emblem with blue sky, orange earth, a green mountain with LMS lettering, and simplified weather service symbols.</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#71c4ea"/>
      <stop offset="100%" stop-color="#2198d3"/>
    </linearGradient>
    <linearGradient id="earth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ce8135"/>
      <stop offset="100%" stop-color="#b8691f"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#76b654"/>
      <stop offset="100%" stop-color="#55a542"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
  </defs>

  <circle cx="128" cy="128" r="123" fill="#101417"/>
  <circle cx="128" cy="128" r="119" fill="#d38735"/>

  <g clip-path="url(#circleClip)">
