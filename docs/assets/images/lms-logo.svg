      <path d="M74 97c13 0 22 9 25 27 3 18-2 33-14 43-9-6-14-16-14-31 0-19 1-30 3-39z"/>
      <path d="M182 97c-13 0-22 9-25 27-3 18 2 33 14 43 9-6 14-16 14-31 0-19-1-30-3-39z"/>
