      <path d="M96 112c0-13 10-23 23-23 5 0 9 1 13 4 4-9 13-15 23-15 13 0 23 9 25 21 2 0 3 0 4 0 14 0 25 11 25 25s-11 24-25 24h-63c-14 0-25-11-25-24z"/>
    </g>

    <g stroke="#101417" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <line x1="128" y1="78" x2="128" y2="144"/>
      <line x1="116" y1="82" x2="140" y2="82"/>
      <line x1="128" y1="144" x2="128" y2="165"/>
      <circle cx="120" cy="76" r="3.5" fill="#101417"/>
      <circle cx="136" cy="76" r="3.5" fill="#101417"/>
